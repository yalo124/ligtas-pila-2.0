<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style4.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <title>Submit</title>
</head>
<body>
    <!--fixed response after submitting-->
    <div class="content">
        <br>
        <h3><center>You are now eligible and may wait 1-3 business days for the confirmation while we process.</center></h3><br>
        <p>Please take note of your reference ID indicated below. </p>
        <h2>Reference Number: <strong id="appID"></strong></h2>
        <p>*Take Note: Please take a screenshot of your reference number</p>
        <br><br>
        <h1><center>THANK YOU FOR SUBMITTING!</center></h1><br>
        <button onclick="window.location.href='client.html';" class="done">DONE</button>
        
    </div>

<script>
    //will show the reference number of client
    const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        document.getElementById("appID").textContent = String(id).padStart(7,'0');
</script>
</body>
</html>
