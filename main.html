<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIGTAS-PILA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
</head>
<body>

    <!--this is for first page where the user will choose between admin and client-->
        <div class="topbanner">
                <div class="logo">
                    <img src="images/logo.png" alt="LIGTAS-PILA Logo">
                    <p></p>
                </div>

                <div class="bannertext">
                    <h1>
                        <span class="LIGTAS">LIGTAS</span><span class="PILA">-PILA</span>
                    </h1>
                    <span class="subtitle">Logic-Based Queue Elimination</span>
                </div>
            </div>
        </div>

        
        <div class="cards-container">
            <!--admin-->
            <button class="adminbox" onclick="window.location.href='admin.html'">
                <img src="images/admin.png" class="adminpicture" alt="admin">
                <h2>ADMIN</h2>
            </button>
            
            <!--client-->
            <button class="clientbox" onclick="window.location.href='client.html'">
                <img src="images/client.png" class="clientpicture" alt="client">
                <h2>REQUEST</h2>

            <div class="container2">
                <div class="wrapper">
                    <img src="images/frontpage-images/image 1.jpg" alt="image1">
                    <img src="images/frontpage-images/image 2.jpg" alt="image2">
                    <img src="images/frontpage-images/image 3.jpg" alt="image3">
                    <img src="images/frontpage-images/image 4.jpg" alt="image4">
                </div>
            </div>
            </button>
        </div>
</body>
</html>
